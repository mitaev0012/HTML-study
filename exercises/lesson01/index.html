<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML基礎レッスン</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <!-- Step 1: 見出しを書いてみよう -->
    <h1>HTMLの基礎を学ぶ</h1>

    <!-- Step 2: ここに <h2> と <p> を追加しよう -->
    <h2>h2とはサブタイトル</h2>
    <p>私の名前は三田彩斗</p>
    <!-- Step 3: ここに <ul> または <ol> のリストを追加しよう -->
    <h2>趣味リスト</h2>
    <ul>
      <li>ゲーム</li>
      <li>漫画</li>
    </ul>

    <h2>食べ物ランキング</h2>
    <ol>
      <li>もつ鍋</li>
      <li>キムチ鍋</li>
    </ol>
    <!-- Step 4: ここに <a> リンクと <img> 画像を追加しよう -->
    <h2>リンク</h2>
    <p><a href="https://www.youtube.com/">youtube開く</a></p>
    <h2>画像</h2>
    <img
      src="https://media.discordapp.net/attachments/1305771119860650054/1497141054929895454/IMG_5712.jpg?ex=69f10e03&is=69efbc83&hm=f110849f6eff537d491e61b763a244d2fa58594ec890877cf35710cbcd1c026c&=&format=webp&width=766&height=1023"
      alt="サンプル画像"
    />
    <!-- Step 5: <div> でグループ化してみよう -->
    <div class="ore">
      <h2>プロフィール</h2>
      <p>三田/20歳</p>
      <p>大阪在住</p>
    </div>

    <div>
      <h2>趣味</h2>
      <ul>
        <li>漫画</li>
        <li>ゲーム</li>
      </ul>
    </div>

    <h1>三田彩斗</h1>
    <p>イベントマネジメント専攻です</p>
    <p>春休みにしたこと</p>
    <ul>
      <li>Kアリーナ横浜にノイミーのライブ</li>
      <li>日本武道館にニアジョイライブ</li>
      <li>簿記三級取れました</li>
    </ul>
  <img src="https://via.placeholder.com" alt="サンプル画像"
  </body>
</html>
